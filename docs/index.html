<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#128c7e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sandesha</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div id="login-view">
    <div class="card login-card">
      <h1>Sandesha</h1>
      <p class="subtitle">WhatsApp group messaging</p>
      <div class="field">
        <label for="login-password">Admin password</label>
        <div class="pw-row">
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
          <button type="button" class="toggle-pw" id="toggle-pw">Show</button>
        </div>
      </div>
      <button type="button" class="btn" id="btn-login">Login</button>
      <p id="login-status" class="hint" style="margin-top:12px"></p>
    </div>
  </div>

  <div id="app-view" class="hidden app-shell">
    <div id="offline-banner" class="hidden">Cannot reach server — check tunnel and API URL in Settings</div>

    <header class="app-header" id="app-header">
      <button type="button" class="back-btn hidden" id="header-back" aria-label="Back">‹</button>
      <h1 id="header-title">Sandesha</h1>
    </header>

    <main class="app-main" id="app-main">
      <div class="page-panel active" data-tab="home" id="page-home"></div>
      <div class="page-panel" data-tab="send" id="page-send"></div>
      <div class="page-panel" data-tab="schedule" id="page-schedule"></div>
      <div class="page-panel" data-tab="groups" id="page-groups"></div>
      <div class="page-panel" data-tab="more" id="page-more"></div>

      <div class="sub-page" data-sub="group-detail" id="sub-group-detail"></div>
      <div class="sub-page" data-sub="sets" id="sub-sets"></div>
      <div class="sub-page" data-sub="contacts" id="sub-contacts"></div>
      <div class="sub-page" data-sub="bulk" id="sub-bulk"></div>
      <div class="sub-page" data-sub="add-members" id="sub-add-members"></div>
      <div class="sub-page" data-sub="ai" id="sub-ai"></div>
      <div class="sub-page" data-sub="settings" id="sub-settings"></div>
      <div class="sub-page" data-sub="help" id="sub-help"></div>
    </main>

    <nav class="bottom-nav" id="bottom-nav" aria-label="Main">
      <button type="button" data-tab="home" class="active">
        <span class="nav-icon">🏠</span><span>Home</span>
      </button>
      <button type="button" data-tab="send">
        <span class="nav-icon">📤</span><span>Send</span>
      </button>
      <button type="button" data-tab="schedule">
        <span class="nav-icon">⏰</span><span>Schedule</span>
      </button>
      <button type="button" data-tab="groups">
        <span class="nav-icon">👥</span><span>Groups</span>
      </button>
      <button type="button" data-tab="more">
        <span class="nav-icon">☰</span><span>More</span>
      </button>
    </nav>
  </div>

  <div id="toast-container"></div>

  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        });
      }
    })();
  </script>
  <script src="config.js"></script>
  <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
